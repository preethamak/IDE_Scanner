name: Deep Scan worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      job_id:
        description: Exact queued scan job to claim; empty means claim the next prioritized job
        required: false
        type: string
      extension_id:
        description: Exact extension to enqueue for a canonical maintenance scan
        required: false
        type: string
      version:
        description: Exact extension version to enqueue
        required: false
        type: string
      scan_purpose:
        description: Canonical publication purpose (benchmark or public_intelligence)
        required: false
        type: choice
        options:
          - public_intelligence
          - benchmark

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enqueue canonical maintenance scan
        id: enqueue
        env:
          SCAN_ENQUEUE_URL: https://ide-scanner.vercel.app/api/internal/scan-jobs/enqueue
          SCAN_EXTENSION_ID: ${{ inputs.extension_id }}
          SCAN_EXTENSION_VERSION: ${{ inputs.version }}
          SCAN_PURPOSE: ${{ inputs.scan_purpose }}
          SCAN_RUNNER_SECRET: ${{ secrets.SCAN_RUNNER_SECRET }}
        run: python scripts/enqueue_scan.py
      - name: Claim queued scan
        id: claim
        env:
          # Only the canonical apex host. ide-scanner-web.vercel.app 307-redirects
          # here, and urllib refuses to follow a 307 on POST, crashing the claim.
          SCAN_CLAIM_URLS: https://ide-scanner.vercel.app/api/internal/scan-jobs/claim
          SCAN_RUNNER_ID: github-actions-${{ github.run_id }}
          SCAN_JOB_ID: ${{ inputs.job_id || steps.enqueue.outputs.job_id }}
          SCAN_GITHUB_RUN_ID: ${{ github.run_id }}
          SCAN_RUNNER_SECRET: ${{ secrets.SCAN_RUNNER_SECRET }}
        run: python scripts/claim_scan.py
      - name: Install analyzers
        if: steps.claim.outputs.has_job == 'true'
        run: python -m pip install -e '.[analysis]'
      - name: Scan exact artifact
        id: analyze
        if: steps.claim.outputs.has_job == 'true'
        env:
          IDE_SCANNER_REQUIRE_PROVIDERS: semgrep,yara,dependency_intelligence
          IDE_SCANNER_BUILD_SHA: ${{ github.sha }}
        run: |
          semgrep --validate --config rules/semgrep/vscode-security.yml
          ide-scanner scan \
            --extension-id '${{ steps.claim.outputs.extension_id }}' \
            --version '${{ steps.claim.outputs.version }}' \
            --profile deep \
            --online \
            --format bundle.json \
            --include-raw-evidence \
            --output scan-bundle.json
      - name: Submit signed result
        if: steps.claim.outputs.has_job == 'true' && success()
        env:
          SCAN_JOB_ID: ${{ steps.claim.outputs.job_id }}
          SCAN_CALLBACK_URL: ${{ steps.claim.outputs.callback_url }}
          SCAN_CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
        run: python scripts/callback_scan.py scan-bundle.json
      - name: Report workflow failure
        if: steps.claim.outputs.has_job == 'true' && steps.analyze.outcome == 'failure'
        env:
          SCAN_JOB_ID: ${{ steps.claim.outputs.job_id }}
          SCAN_CALLBACK_URL: ${{ steps.claim.outputs.callback_url }}
          SCAN_CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
          SCAN_ERROR: Deep Scan failed before a canonical report was produced.
        run: python scripts/callback_scan.py
      - uses: actions/upload-artifact@v4
        if: steps.claim.outputs.has_job == 'true' && always()
        with:
          name: deep-scan-${{ steps.claim.outputs.job_id }}
          path: scan-bundle.json
          retention-days: 7
          if-no-files-found: ignore
