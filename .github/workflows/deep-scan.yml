name: Deep Scan worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Claim queued scan
        id: claim
        env:
          SCAN_CLAIM_URL: https://ide-scanner.vercel.app/api/internal/scan-jobs/claim
          SCAN_RUNNER_ID: github-actions-${{ github.run_id }}
          SCAN_RUNNER_SECRET: ${{ secrets.SCAN_RUNNER_SECRET }}
        run: python scripts/claim_scan.py
      - name: Install analyzers
        if: steps.claim.outputs.has_job == 'true'
        run: python -m pip install -e '.[analysis]'
      - name: Scan exact artifact
        if: steps.claim.outputs.has_job == 'true'
        env:
          IDE_SCANNER_REQUIRE_PROVIDERS: semgrep,yara,dependency_intelligence
        run: >-
          ide-scanner scan
          --extension-id '${{ steps.claim.outputs.extension_id }}'
          --version '${{ steps.claim.outputs.version }}'
          --profile deep
          --online
          --format bundle.json
          --include-raw-evidence
          --output scan-bundle.json
      - name: Submit signed result
        if: steps.claim.outputs.has_job == 'true' && success()
        env:
          SCAN_JOB_ID: ${{ steps.claim.outputs.job_id }}
          SCAN_CALLBACK_URL: ${{ steps.claim.outputs.callback_url }}
          SCAN_CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
        run: python scripts/callback_scan.py scan-bundle.json
      - name: Report workflow failure
        if: steps.claim.outputs.has_job == 'true' && failure()
        env:
          SCAN_JOB_ID: ${{ steps.claim.outputs.job_id }}
          SCAN_CALLBACK_URL: ${{ steps.claim.outputs.callback_url }}
          SCAN_CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
          SCAN_ERROR: Deep Scan failed before a canonical report was produced.
        run: python scripts/callback_scan.py
      - uses: actions/upload-artifact@v4
        if: steps.claim.outputs.has_job == 'true' && always()
        with:
          name: deep-scan-${{ steps.claim.outputs.job_id }}
          path: scan-bundle.json
          retention-days: 7
          if-no-files-found: ignore
