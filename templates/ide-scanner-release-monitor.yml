name: IDE Scanner release monitor

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[analysis]'
      - run: python scripts/release_monitor.py --output ide-scanner-release-monitor.json
      - name: Open review issues for changed releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, subprocess
          report = json.load(open('ide-scanner-release-monitor.json'))
          for change in report['changes']:
              ext = change['extension_id']; current = change['current']; prior = change['approved']
              title = f"IDE Scanner review: {ext}@{current['version']}"
              body = ("A new exact extension artifact needs review.\n\n"
                      f"Approved: `{prior.get('version')}#{prior.get('sha256')}`\n"
                      f"Current: `{current['version']}#{current['sha256']}`\n"
                      f"Scanner decision: **{current['decision'].upper()}**\n\n"
                      "Update the reviewed lock only after recording the approval or exception.")
              existing = subprocess.run(['gh','issue','list','--state','open','--search',title,'--json','title'], capture_output=True, text=True, check=True)
              if not any(item.get('title') == title for item in json.loads(existing.stdout)):
                  subprocess.run(['gh','issue','create','--title',title,'--body',body], check=True)
          PY
